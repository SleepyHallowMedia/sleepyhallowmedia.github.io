<!doctype html>
<html lang="en" data-theme="light" data-issue="No. 1" data-season="Autumn, October 2026" data-price="$7.00">
<head>
  <!-- One-time ads (keep if needed) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9198552366209337" crossorigin="anonymous"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sleepy Hallow Media — A World of Your Own</title>

  <!-- Canonical & OG (leave generic; script can refine as needed) -->
  <link rel="canonical" href="https://sleepyhallowmedia.github.io/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Sleepy Hallow Media" />
  <meta property="og:title" content="Sleepy Hallow Media — A World of Your Own" />
  <meta property="og:description" content="Independent reporting from the Hollow, presented as a surreal folio." />
  <meta property="og:image" content="assets/social-default.jpg" />
  <meta property="og:url" content="https://sleepyhallowmedia.github.io/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sleepy Hallow Media — A World of Your Own" />
  <meta name="twitter:description" content="Independent reporting from the Hollow, presented as a surreal folio." />
  <meta name="twitter:image" content="assets/social-default.jpg" />

  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

  <!-- Base styles (keep your tokens) -->
  <link rel="stylesheet" href="styles.css?v=7.2" />
  <!-- Surreal overlay (new) -->
  <link rel="stylesheet" href="surreal.css?v=1.0" />

  <!-- Existing libs + your app + bridge -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script defer src="script.js?v=6.8"></script>
  <script defer src="effects.js?v=2.0"></script>
  <script defer src="surreal.js?v=1.0"></script>
</head>
<body data-page="folio">
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- Folio frame: vertical masthead, stamp, and void -->
  <main id="main" class="folio" tabindex="-1" aria-label="Sleepy Hallow — Folio">
    <!-- Left vertical masthead -->
    <aside class="folio-mast" aria-hidden="true">
      <span>HALLOW</span>
    </aside>

    <!-- Cover stamp (auto-populated via data-* and JS) -->
    <aside class="folio-stamp" role="note" aria-label="Issue details">
      <div class="stamp-issue"></div>
      <div class="stamp-season"></div>
      <div class="stamp-price"></div>
      <div class="stamp-barcode" aria-hidden="true"></div>
    </aside>

    <!-- Cinematic cover -->
    <section class="cover-scene" aria-label="Cover">
      <figure class="cover-art">
        <!-- You can set a default; script will update to lead thumbnail -->
        <img id="cover-img" src="assets/social-default.jpg" alt="" decoding="async" loading="eager" />
      </figure>
      <header class="cover-titles">
        <h1 class="cover-title">A WORLD OF YOUR OWN</h1>
        <p class="cover-sub">A magazine for those who venture outside</p>
      </header>

      <!-- Chapter-size links (the “tabs”, but monumental) -->
      <nav class="cover-chapters" aria-label="Chapters">
        <a data-chapter="Night" href="newsletters.html?tag=Night">Life after 10PM</a>
        <a data-chapter="Reality" href="newsletters.html?tag=Reality">The real world</a>
        <a data-chapter="Personal" href="newsletters.html?tag=Personal">Personal stories</a>
        <a data-chapter="Music" href="newsletters.html?tag=Music">Our top songs</a>
        <a data-chapter="Places" href="newsletters.html?tag=Places">Places to see</a>
      </nav>
    </section>

    <!-- Stream: oblique stack of stories (script renders from manifest) -->
    <section class="oblique-stream" aria-label="Latest from the Hollow">
      <ol id="stream" class="oblique-list" role="list" aria-busy="true"></ol>
    </section>

    <!-- Credits / footer minimal -->
    <footer class="folio-foot" aria-label="Footer">
      <a class="brand" href="index.html">
        <img class="brand-mark" src="assets/logo.png" alt="Sleepy Hallow Media logo" width="28" height="28" />
        <span class="brand-name">Sleepy Hallow Media</span>
      </a>
      <div class="copy muted">© <span id="year"></span> Sleepy Hallow Media</div>
    </footer>
  </main>

  <div id="progress-bar" aria-hidden="true"></div>
  <div class="cursor-halo" aria-hidden="true"></div>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
